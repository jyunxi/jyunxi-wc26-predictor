name: 每日自动更新世界杯预测

on:
  schedule:
    - cron: "0 10 * * *"   # 每天 UTC 10:00(北京时间 18:00)
  workflow_dispatch:        # 也可以在 Actions 页面手动触发

permissions:
  contents: write

jobs:
  update-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 拉取最新数据并重跑模拟
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python fetch_data.py --simulate --sims 20000

      - name: 提交并发布
        run: |
          git config user.name "wc26-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "每日数据更新 $(date -u +%F)"
          git push
